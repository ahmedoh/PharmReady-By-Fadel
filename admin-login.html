<!DOCTYPE html>
<html lang="ar" dir="rtl">
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم | PharMReady</title>
  <!-- Google Fonts: Cairo -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-wrapper {
      display: flex;
      min-height: 100vh;
    }
    .admin-sidebar {
      width: 260px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 20px;
      transition: var(--transition);
      z-index: 100;
    }
    .admin-sidebar-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 20px;
    }
    .admin-tab-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .admin-tab-btn {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: right;
      transition: var(--transition);
      width: 100%;
    }
    .admin-tab-btn:hover {
      background: var(--bg-primary);
      color: var(--text-main);
    }
    .admin-tab-btn.active {
      background: var(--color-primary-glow);
      color: var(--color-primary);
      border-color: var(--border-color);
    }
    .admin-main-container {
      flex: 1;
      padding: 25px;
      background: var(--bg-primary);
      transition: var(--transition);
      overflow-y: auto;
    }
    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }
    .stat-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: var(--shadow-sm);
    }
    .stat-box p {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stat-box .stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-main);
    }
    .admin-section-content {
      display: none;
      animation: fadeIn 0.4s ease forwards;
    }
    .admin-section-content.active {
      display: block;
    }
    .admin-table-container {
      overflow-x: auto;
      margin-top: 15px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-secondary);
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      padding: 14px 18px;
      text-align: right;
      font-size: 13px;
      border-bottom: 1px solid var(--border-color);
    }
    th {
      background: var(--bg-primary);
      color: var(--text-muted);
      font-weight: 700;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
    }
    .status-pending { background: rgba(245, 158, 11, 0.15); color: #b45309; }
    .status-accepted { background: rgba(16, 185, 129, 0.15); color: #047857; }
    .status-rejected { background: rgba(225, 29, 72, 0.15); color: #e11d48; }
    
    .menu-toggle-btn {
      display: none;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      width: 40px;
      height: 40px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    @media (max-width: 992px) {
      .admin-sidebar {
        position: fixed;
        right: -260px;
        top: 0;
        bottom: 0;
        box-shadow: -5px 0 20px rgba(0,0,0,0.15);
      }
      .admin-sidebar.active {
        right: 0;
      }
      .menu-toggle-btn {
        display: flex;
      }
    }
  
    .pass-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
    }
    .pass-input {
      width: 100%;
      padding-left: 45px !important;
      padding-right: 45px !important;
      font-size: 16px !important;
      letter-spacing: 2px !important;
      font-family: monospace, 'Cairo', sans-serif !important;
      direction: ltr !important;
      text-align: left !important;
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .pass-icon-left {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      z-index: 5;
    }
    .btn-toggle-visibility {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      font-size: 1rem;
      transition: color 0.2s ease, transform 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }
    .btn-toggle-visibility:hover {
      color: var(--color-primary);
      transform: translateY(-50%) scale(1.15);
    }
    .tracker-dot {
      position: absolute;
      bottom: 8px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--color-gold, #c5bd63);
      box-shadow: 0 0 8px var(--color-gold, #c5bd63), 0 0 15px var(--color-gold, #c5bd63);
      pointer-events: none;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.2s ease, transform 0.2s ease, left 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 4;
    }
    .pass-input:focus ~ .tracker-dot {
      opacity: 1;
      transform: scale(1);
    }
    .text-mirror {
      position: absolute;
      top: 0;
      left: 0;
      white-space: pre;
      visibility: hidden;
      font-size: 16px;
      letter-spacing: 2px;
      font-family: monospace, 'Cairo', sans-serif;
      pointer-events: none;
    }
  
</style>
<style>

    .auth-wrapper {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-sm);
      text-align: center;
      box-sizing: border-box;
    }
    .auth-wrapper img {
      max-width: 120px;
      margin-bottom: 20px;
    }
    .auth-wrapper h2 {
      margin-bottom: 25px;
      color: var(--text-main);
      font-size: 24px;
      font-weight: 700;
    }
    .form-group {
      text-align: right;
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .pass-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .pass-input {
      width: 100%;
      padding: 12px;
      padding-left: 40px !important;
      padding-right: 40px !important;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-secondary);
      color: var(--text-main);
      font-family: monospace;
      font-size: 16px;
      box-sizing: border-box;
    }
    .pass-input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(32, 178, 170, 0.2);
    }
    .pass-icon-left {
      position: absolute;
      left: 15px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .btn-toggle-visibility {
      position: absolute;
      right: 15px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      font-size: 16px;
    }
    .btn-toggle-visibility:hover {
      color: var(--primary-color);
    }

</style>
</head>
<body style="background: var(--bg-primary); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;">

  <!-- Supabase & Config -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>

  <!-- Login view -->
  <div id="admin-login-view" style="display:flex; width: 100%; justify-content: center; align-items: center; min-height: 100vh; background: var(--bg-primary);"><div class="auth-wrapper">
      
      <!-- Brand Header -->
      <div class="auth-header" style="text-align: center;">
        <div style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 20px;">
          <img src="logo_pr.png" alt="PharmReady" class="logo-img" style="height: 48px; max-height: 48px; width: auto; object-fit: contain;">
          <i class="fa-solid fa-handshake" style="font-size: 32px; color: var(--color-primary); margin: 0 8px;"></i>
          <img src="logo.png" alt="شعار منصة PharMReady" class="logo-img" style="height: 48px; max-height: 48px; width: auto; object-fit: contain;">
        </div>
        <h2 data-i18n="admin_title">منصة PharMReady &amp; PharmReady</h2>
        <p data-i18n="admin_subtitle">بوابة الدخول المخصصة للمدير والمطور</p>
      </div>

      <!-- Login Form Card -->
      <div class="card">
        <form id="admin-login-form">
          <!-- Trick browser password managers to prevent autocomplete popup suggestions -->
          <input type="password" name="dummy-password" style="display:none;" autocomplete="current-password">

          <div class="form-group" style="margin-bottom: 20px;">
            <label for="admin-username" style="font-weight: bold; margin-bottom: 8px; display: block;">اسم المستخدم للمسؤول <span class="required">*</span></label>
            <div style="position: relative; display: flex; align-items: center; width: 100%;">
              <input type="text" id="admin-username" name="admin-user" required placeholder="اسم المستخدم" class="pass-input" style="font-family: inherit; direction: ltr; text-align: left; padding-left: 45px !important;" autocomplete="username">
              <i class="fa-solid fa-user pass-icon-left"></i>
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 20px;">
            <label for="admin-password" data-i18n="admin_pass_label">رمز المرور السري للمسؤول <span class="required">*</span></label>
            <div class="pass-wrapper">
              <input type="password" id="admin-password" name="admin-secret-key" required placeholder="••••••••" autocomplete="new-password" autocomplete="off" class="pass-input" spellingcheck="false">
              <i class="fa-solid fa-key pass-icon-left"></i>
              
              <!-- Toggle visibility button -->
              <button type="button" id="btn-toggle-pass" class="btn-toggle-visibility" title="إظهار/إخفاء رمز المرور">
                <i class="fa-solid fa-eye-slash"></i>
              </button>
              
              <!-- Text mirror and tracker dot -->
              <span id="text-mirror" class="text-mirror"></span>
              <div id="tracker-dot" class="tracker-dot"></div>
            </div>
          </div>

          <button type="submit" class="btn btn-gold" style="width: 100%; padding: 14px;">
            <i class="fa-solid fa-unlock-keyhole"></i> <span data-i18n="admin_btn_login">تسجيل الدخول للمستودع</span>
          </button>
        </form>
      </div>

      <!-- Footer option to go back to student login -->
      <div class="auth-footer">
        <a href="index.html" style="font-size: 13px;"><i class="fa-solid fa-arrow-right"></i> <span data-i18n="admin_back">العودة لبوابة المتدربين</span></a>
      </div>

    </div></div></div>


  <script>
    // Check if already logged in
    const adminLoggedIn = sessionStorage.getItem("admin_logged_in");
    const adminUsername = sessionStorage.getItem("admin_username");
    if (adminLoggedIn === "true" && adminUsername) {
      window.location.href = "admin.html";
    }

    // Form Submission for Admin Login
    const adminLoginForm = document.getElementById("admin-login-form");
    if (adminLoginForm) {
      adminLoginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const username = document.getElementById("admin-username").value.trim().toLowerCase();
        const password = document.getElementById("admin-password").value.trim().toLowerCase();

        const btnSubmit = e.target.querySelector("button[type='submit']");
        const originalText = btnSubmit.innerHTML;
        btnSubmit.disabled = true;
        btnSubmit.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Loading...`;

        try {
          const response = await apiRequest({
            action: "adminLogin",
            username: username,
            password: password
          });

          if (response.success && response.admin) {
            sessionStorage.setItem("admin_logged_in", "true");
            sessionStorage.setItem("admin_username", response.admin.username);
            sessionStorage.setItem("admin_password", password);
            sessionStorage.setItem("admin_role", response.admin.role);
            sessionStorage.setItem("admin_permissions", response.admin.permissions);
            sessionStorage.setItem("admin_display_name", response.admin.displayName || response.admin.username);

            showToast("Welcome back " + (response.admin.displayName || response.admin.username), "success");
            setTimeout(() => {
              window.location.href = "admin.html";
            }, 1000);
          } else if (response.success) {
            // Fallback
            sessionStorage.setItem("admin_logged_in", "true");
            sessionStorage.setItem("admin_username", username);
            sessionStorage.setItem("admin_password", password);
            showToast(`Login success: ${username}`, "success");
            setTimeout(() => { window.location.href = "admin.html"; }, 1000);
          } else {
            showToast(response.message || "Invalid credentials!", "error");
          }
        } catch (err) {
          showToast("Connection error", "error");
        } finally {
          btnSubmit.disabled = false;
          btnSubmit.innerHTML = originalText;
        }
      });
    }

    // Toggle password visibility
    const passInput = document.getElementById("admin-password");
    const btnToggle = document.getElementById("btn-toggle-pass");
    if (btnToggle && passInput) {
      btnToggle.addEventListener("click", () => {
        if (passInput.type === "password") {
          passInput.type = "text";
          btnToggle.innerHTML = `<i class="fa-solid fa-eye"></i>`;
        } else {
          passInput.type = "password";
          btnToggle.innerHTML = `<i class="fa-solid fa-eye-slash"></i>`;
        }
      });
    }
  </script>
</body>
</html>
