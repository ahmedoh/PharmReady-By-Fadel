<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة المشرفين | PharmReady-AlmaghwryBy-Fadel</title>
  <!-- Google Fonts: Cairo -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .pass-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
    }
    .pass-input {
      width: 100%;
      padding-left: 45px !important;
      padding-right: 45px !important;
      font-size: 16px !important;
      letter-spacing: 2px !important;
      font-family: monospace, 'Cairo', sans-serif !important;
      direction: ltr !important;
      text-align: left !important;
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .pass-icon-left {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      z-index: 5;
    }
    .btn-toggle-visibility {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      font-size: 1rem;
      transition: color 0.2s ease, transform 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }
    .btn-toggle-visibility:hover {
      color: var(--color-primary);
      transform: translateY(-50%) scale(1.15);
    }
    .tracker-dot {
      position: absolute;
      bottom: 8px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--color-gold, #c5bd63);
      box-shadow: 0 0 8px var(--color-gold, #c5bd63), 0 0 15px var(--color-gold, #c5bd63);
      pointer-events: none;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.2s ease, transform 0.2s ease, left 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 4;
    }
    .pass-input:focus ~ .tracker-dot {
      opacity: 1;
      transform: scale(1);
    }
    .text-mirror {
      position: absolute;
      top: 0;
      left: 0;
      white-space: pre;
      visibility: hidden;
      font-size: 16px;
      letter-spacing: 2px;
      font-family: monospace, 'Cairo', sans-serif;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Top Utilities bar -->
  <div class="app-container" style="max-width: 1200px; padding: 20px 20px 0; display: flex; justify-content: flex-end; gap: 10px;">
    <button class="theme-switch-btn" id="btn-theme" title="تبديل المظهر / Toggle Theme"><i class="fa-solid fa-moon"></i></button>
    <button class="lang-switch-btn" id="btn-lang" title="Toggle Language / تبديل اللغة"><i class="fa-solid fa-globe"></i></button>
  </div>

  <div class="app-container">
    <div class="auth-wrapper">
      
      <!-- Brand Header -->
      <div class="auth-header" style="text-align: center;">
        <div style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 20px;">
          <img src="logo_pr.png" alt="PharmReady" class="logo-img" style="height: 48px; max-height: 48px; width: auto; object-fit: contain;">
          <i class="fa-solid fa-handshake" style="font-size: 20px; color: var(--color-primary); margin: 0 4px;"></i>
          <img src="logo.png" alt="شعار صيدليات آل مغاوري" class="logo-img" style="height: 48px; max-height: 48px; width: auto; object-fit: contain;">
        </div>
        <h2 data-i18n="admin_title">صيدليات آل مغاوري &amp; PharmReady</h2>
        <p data-i18n="admin_subtitle">بوابة الدخول المخصصة للمدير والمطور</p>
      </div>

      <!-- Login Form Card -->
      <div class="card">
        <form id="admin-login-form">
          <!-- Trick browser password managers to prevent autocomplete popup suggestions -->
          <input type="password" name="dummy-password" style="display:none;" autocomplete="current-password">

          <div class="form-group" style="margin-bottom: 20px;">
            <label for="admin-username" style="font-weight: bold; margin-bottom: 8px; display: block;">اسم المستخدم للمسؤول <span class="required">*</span></label>
            <div style="position: relative; display: flex; align-items: center; width: 100%;">
              <input type="text" id="admin-username" name="admin-user" required placeholder="THIS SECTION IS ONLY FOR ADMINS" class="pass-input" style="font-family: inherit; direction: ltr; text-align: left; padding-left: 45px !important;" autocomplete="username">
              <i class="fa-solid fa-user pass-icon-left"></i>
            </div>
          </div>

          <div class="form-group" style="margin-bottom: 20px;">
            <label for="admin-password" data-i18n="admin_pass_label">رمز المرور السري للمسؤول <span class="required">*</span></label>
            <div class="pass-wrapper">
              <input type="password" id="admin-password" name="admin-secret-key" required placeholder="••••••••" autocomplete="new-password" autocomplete="off" class="pass-input" spellingcheck="false">
              <i class="fa-solid fa-key pass-icon-left"></i>
              
              <!-- Toggle visibility button -->
              <button type="button" id="btn-toggle-pass" class="btn-toggle-visibility" title="إظهار/إخفاء رمز المرور">
                <i class="fa-solid fa-eye-slash"></i>
              </button>
              
              <!-- Text mirror and tracker dot -->
              <span id="text-mirror" class="text-mirror"></span>
              <div id="tracker-dot" class="tracker-dot"></div>
            </div>
          </div>

          <button type="submit" class="btn btn-gold" style="width: 100%; padding: 14px;">
            <i class="fa-solid fa-unlock-keyhole"></i> <span data-i18n="admin_btn_login">تسجيل الدخول للمستودع</span>
          </button>
        </form>
      </div>

      <!-- Footer option to go back to student login -->
      <div class="auth-footer">
        <a href="index.html" style="font-size: 13px;"><i class="fa-solid fa-arrow-right"></i> <span data-i18n="admin_back">العودة لبوابة المتدربين</span></a>
      </div>

    </div>
  </div>

  <footer class="app-footer">
    <p data-i18n="footer_text">برمجة وتطوير د. أحمد فاضل © 2026 | جميع الحقوق محفوظة لصيدليات آل مغاوري</p>
    <p style="font-size: 10px; margin-top: 5px; color: rgba(128,128,128,0.4)">Support: 01107118948</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    // Internationalization (AR/EN) Dictionary
    const langData = {
      ar: {
        admin_title: "صيدليات آل مغاوري",
        admin_subtitle: "بوابة الدخول المخصصة للمدير والمطور",
        admin_pass_label: "رمز المرور السري للمسؤول",
        admin_btn_login: "فتح لوحة الإدارة",
        admin_back: "العودة لبوابة المتدربين",
        footer_text: "برمجة وتطوير د. أحمد فاضل © 2026 | جميع الحقوق محفوظة لصيدليات آل مغاوري",
        login_success: "👑 مرحباً بك يا دكتور أحمد فاضل. تم التحقق من الهوية.",
        login_fail: "رمز المرور غير صحيح!",
        connection_error: "حدث خطأ أثناء محاولة الاتصال بالخادم."
      },
      en: {
        admin_title: "El-Maghawry Pharmacies",
        admin_subtitle: "Developer & CEO Dedicated Entrance",
        admin_pass_label: "Administrator Secret Password",
        admin_btn_login: "Unlock Admin Panel",
        admin_back: "Return to Trainee Gate",
        footer_text: "Engineered by Dr. Ahmed Fadel © 2026 | El-Maghawry Pharmacies Group",
        login_success: "👑 Welcome back, Dr. Ahmed Fadel. Credentials verified.",
        login_fail: "Invalid passcode!",
        connection_error: "Error connecting to database server."
      }
    };

    let currentLang = localStorage.getItem("app_lang") || "ar";
    let currentTheme = localStorage.getItem("app_theme") || "sand"; // sand, green, dark

    // Set layout based on theme & language
    function applySettings() {
      // Theme cycling
      document.body.classList.remove("green-theme", "dark-theme");
      if (currentTheme === "green") {
        document.body.classList.add("green-theme");
        document.getElementById("btn-theme").innerHTML = `<i class="fa-solid fa-leaf" style="color: var(--color-primary);"></i>`;
      } else if (currentTheme === "dark") {
        document.body.classList.add("dark-theme");
        document.getElementById("btn-theme").innerHTML = `<i class="fa-solid fa-sun" style="color: var(--color-gold);"></i>`;
      } else { // sand
        document.getElementById("btn-theme").innerHTML = `<i class="fa-solid fa-moon"></i>`;
      }

      // Apply language translation
      document.documentElement.lang = currentLang;
      document.body.dir = currentLang === "ar" ? "rtl" : "ltr";
      


      // Update translated texts
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (langData[currentLang][key]) {
          el.textContent = langData[currentLang][key];
        }
      });
    }

    // Toggle theme action
    document.getElementById("btn-theme").addEventListener("click", () => {
      if (currentTheme === "sand") {
        currentTheme = "green";
      } else if (currentTheme === "green") {
        currentTheme = "dark";
      } else {
        currentTheme = "sand";
      }
      localStorage.setItem("app_theme", currentTheme);
      applySettings();
    });

    // Toggle language action
    document.getElementById("btn-lang").addEventListener("click", () => {
      currentLang = currentLang === "ar" ? "en" : "ar";
      localStorage.setItem("app_lang", currentLang);
      applySettings();
    });

    // Initial load apply
    applySettings();

    // Form Submission
    document.getElementById("admin-login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("admin-username").value.trim().toLowerCase();
      const password = document.getElementById("admin-password").value.trim().toLowerCase();

      const btnSubmit = e.target.querySelector("button[type='submit']");
      const originalText = btnSubmit.innerHTML;
      btnSubmit.disabled = true;
      btnSubmit.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Loading...`;

      try {
        const response = await apiRequest({
          action: "adminLogin",
          username: username,
          password: password
        });

        if (response.success && response.admin) {
          sessionStorage.setItem("admin_logged_in", "true");
          sessionStorage.setItem("admin_username", response.admin.username);
          sessionStorage.setItem("admin_password", password);
          sessionStorage.setItem("admin_role", response.admin.role);
          sessionStorage.setItem("admin_permissions", response.admin.permissions);
          sessionStorage.setItem("admin_display_name", response.admin.displayName || response.admin.username);
          sessionStorage.setItem("login_timestamp", Date.now().toString());

          const welcomeAdminMsg = currentLang === "ar"
            ? `👑 مرحباً ${response.admin.displayName || response.admin.username} (دور: ${response.admin.role})`
            : `👑 Welcome ${response.admin.displayName || response.admin.username} (Role: ${response.admin.role})`;
          showToast(welcomeAdminMsg, "success");
          setTimeout(() => {
            window.location.href = "admin.html";
          }, 1800);
        } else if (response.success) {
          // Fallback if admin object not returned
          sessionStorage.setItem("admin_logged_in", "true");
          sessionStorage.setItem("admin_username", username);
          sessionStorage.setItem("admin_password", password);
          sessionStorage.setItem("login_timestamp", Date.now().toString());
          showToast(`👑 تم تسجيل الدخول: ${username}`, "success");
          setTimeout(() => { window.location.href = "admin.html"; }, 1800);
        } else {
          showToast(response.message || langData[currentLang].login_fail, "error");
        }
      } catch (err) {
        showToast(langData[currentLang].connection_error, "error");
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = originalText;
      }
    });

    // Toggle password visibility & dynamic eye icon update
    const passInput = document.getElementById("admin-password");
    const btnToggle = document.getElementById("btn-toggle-pass");
    const trackerDot = document.getElementById("tracker-dot");
    const textMirror = document.getElementById("text-mirror");

    btnToggle.addEventListener("click", () => {
      if (passInput.type === "password") {
        passInput.type = "text";
        btnToggle.innerHTML = `<i class="fa-solid fa-eye"></i>`;
      } else {
        passInput.type = "password";
        btnToggle.innerHTML = `<i class="fa-solid fa-eye-slash"></i>`;
      }
      updateTracker();
      passInput.focus();
    });

    // Mirror typing length to absolute mirror span to compute cursor x-coordinate
    function updateTracker() {
      const text = passInput.value;
      if (passInput.type === "password") {
        textMirror.textContent = "•".repeat(text.length);
      } else {
        textMirror.textContent = text;
      }
      
      const textWidth = textMirror.getBoundingClientRect().width;
      const startOffset = 45; // matching pass-input left padding
      
      trackerDot.style.left = (startOffset + textWidth) + "px";
    }

    passInput.addEventListener("input", updateTracker);
    passInput.addEventListener("keyup", updateTracker);
    passInput.addEventListener("focus", updateTracker);
    window.addEventListener("resize", updateTracker);
  </script>
</body>
</html>
